 .container { width:100%; max-width:800px; background:var(--glass); backdrop-filter: blur(20px); padding:25px; border-radius:24px; border:1px solid rgba(148,163,184,0.2); }
 .logo {font-size:28px; font-weight:900; color:var(--accent); text-align:center; margin-bottom:15px}
 .btn {padding:14px 18px; margin:8px 0; border:none; border-radius:14px; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:white; cursor:pointer; font-weight:800; width:100%; font-size:17px; transition:0.3s}
 .btn:hover {transform:scale(1.03)}
 .btn-subject {background:rgba(15,23,42,0.8); display:flex; align-items:center; gap:10px; font-size:18px}
 .btn-option {background:rgba(15,23,42,0.8); text-align:left; border:2px solid transparent}
 .btn-option:hover {border-color:var(--accent)}
 .btn-option.correct {background:var(--accent2)}
 .btn-option.wrong {background:#ef4444}
  input {width:100%; padding:12px; margin:8px 0; background:rgba(15,23,42,0.8); border:1px solid rgba(148,163,184,0.3); border-radius:10px; font-weight:600; font-size:16px; color:white}
 .timer {font-size:36px; font-weight:900; text-align:center; color:var(--accent)}
 .timer.low {color:#ef4444; animation: blink 1s infinite}
  @keyframes blink {50%{opacity:0.5}}
 .questionBox {font-size:20px; font-weight:700; margin:20px 0}
 .scoreBoard {display:flex; justify-content:space-between; font-size:16px; font-weight:700; margin-bottom:15px; background:rgba(15,23,42,0.8); padding:10px; border-radius:10px}
 .subjectGrid {display:grid; grid-template-columns: repeat(2, 1fr); gap:12px}
</style>
</head>

<div class="container">

    <h3 style="margin:15px 0">Choose Subject - 50 Questions Each:</h3>
    <div class="subjectGrid">

      <button class="btn btn-subject" onclick="startQuiz('Hindi')"><i class="fa-solid fa-language"></i> Hindi</button>
    </div>
    <button class="btn" onclick="resetProgress()" style="background:#ef4444; margin-top:15px"><i class="fa-solid fa-rotate"></i> Reset All Progress</button>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen" style="display:none">
    <div class="scoreBoard">
      <span><i class="fa-solid fa-book"></i> <span id="currentSub"></span></span>
      <span>Q: <span id="qNo">1</span>/10</span>
      <span>Score: <span id="score">0</span></span>
    </div>
    <div class="timer" id="timer">45</div>
    <div class="questionBox" id="question"></div>
    <div id="options"></div>
  </div>
