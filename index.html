<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexus Task Hub | Multi Workspace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --bg1:#0f172a; --bg2:#1e293b; --accent:#38bdf8; --accent2:#a855f7; --green:#22c55e; --orange:#f97316;
    --glass: rgba(30,41,59,0.6); --blur: blur(16px);
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family: 'Outfit', sans-serif;}
  body { background: linear-gradient(135deg, var(--bg1), var(--bg2)); color:#e2e8f0; min-height:100vh; padding:20px; }
  
  .header {display:flex; justify-content:space-between; align-items:center; background:var(--glass); backdrop-filter:var(--blur); padding:16px 24px; border-radius:16px; border:1px solid rgba(148,163,184,0.2); margin-bottom:20px}
  .logo {font-size:26px; font-weight:900; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent}
  
  .workspaceSelect {text-align:center; padding:40px; max-width:800px; margin:10vh auto;}
  .workspaceGrid {display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:20px; margin-top:30px}
  .workspaceCard {background:var(--glass); padding:30px 20px; border-radius:20px; border:1px solid rgba(148,163,184,0.2); cursor:pointer; transition:0.3s}
  .workspaceCard:hover {transform:translateY(-8px); border-color:var(--accent)}
  .workspaceCard i {font-size:40px; margin-bottom:10px; color:var(--accent)}

  .container { display:grid; grid-template-columns: 280px 1fr 320px; gap:20px; height:calc(100vh - 120px) }
  .panel {background:var(--glass); backdrop-filter:var(--blur); border:1px solid rgba(148,163,184,0.2); padding:20px; border-radius:20px; overflow-y:auto}
  .panel h3 { font-size:18px; font-weight:800; margin-bottom:15px; color:var(--accent); display:flex; align-items:center; gap:10px }

  .btn {padding:12px 16px; margin:8px 0; border:none; border-radius:12px; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:white; cursor:pointer; font-weight:700; width:100%; font-size:15px; display:flex; align-items:center; justify-content:center; gap:8px; transition:0.3s}
  .btn:hover {transform:scale(1.03)}
  .btn-orange {background:linear-gradient(135deg, var(--orange), #fb923c)}
  .btn-green {background:linear-gradient(135deg, var(--green), #4ade80)}

  input, select, textarea {width:100%; padding:12px; margin:8px 0; background:rgba(15,23,42,0.8); border:1px solid rgba(148,163,184,0.3); border-radius:10px; font-weight:600; font-size:15px; color:white}
  
  .taskCard {background:rgba(15,23,42,0.7); padding:14px; margin:10px 0; border-radius:12px; border-left:4px solid var(--accent); transition:0.3s}
  .taskCard.high {border-color:var(--orange)}
  .taskCard.done {border-color:var(--green); opacity:0.6}
  .priority {font-size:12px; padding:3px 8px; border-radius:6px; float:right; font-weight:800}
  .priority.high {background:var(--orange)}
  .priority.medium {background:var(--accent)}
  .priority.low {background:var(--green)}
  
  .member {display:flex; align-items:center; gap:10px; padding:10px; background:rgba(15,23,42,0.5); border-radius:10px; margin:6px 0}
  .chartBox {background:rgba(15,23,42,0.8); padding:15px; border-radius:12px; height:250px}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><i class="fa-solid fa-atom"></i> Nexus Task Hub</div>
  <button class="btn btn-orange" onclick="backToWorkspace()" style="width:auto; display:none" id="backBtn"><i class="fa-solid fa-arrow-left"></i> Change Workspace</button>
</div>

<!-- 1. WORKSPACE SELECTION SCREEN -->
<div id="workspaceScreen" class="workspaceSelect">
  <h1 style="font-size:36px; font-weight:900">Choose Your Workspace</h1>
  <p style="opacity:0.7">One platform for School, Office, Home, and More</p>
  <div class="workspaceGrid">
    <div class="workspaceCard" onclick="selectWorkspace('School')"><i class="fa-solid fa-school"></i><h3>School</h3></div>
    <div class="workspaceCard" onclick="selectWorkspace('Office')"><i class="fa-solid fa-building"></i><h3>Office</h3></div>
    <div class="workspaceCard" onclick="selectWorkspace('Home')"><i class="fa-solid fa-house"></i><h3>Home</h3></div>
    <div class="workspaceCard" onclick="selectWorkspace('Gym')"><i class="fa-solid fa-dumbbell"></i><h3>Gym</h3></div>
    <div class="workspaceCard" onclick="selectWorkspace('Coaching')"><i class="fa-solid fa-chalkboard-user"></i><h3>Coaching</h3></div>
    <div class="workspaceCard" onclick="selectWorkspace('Team')"><i class="fa-solid fa-users"></i><h3>Project Team</h3></div>
  </div>
</div>

<!-- 2. MAIN DASHBOARD -->
<div id="mainDashboard" style="display:none">
  <div class="container">
    <!-- LEFT: CREATE TASK -->
    <div class="panel">
      <h3><i class="fa-solid fa-plus"></i> Create New Task</h3>
      <input id="taskTitle" placeholder="Task Title">
      <textarea id="taskDesc" placeholder="Description" rows="3"></textarea>
      <select id="taskAssign">
        <option value="">Assign To</option>
      </select>
      <div style="display:flex; gap:10px">
        <input type="date" id="taskDue">
        <select id="taskPriority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <input type="file" id="taskFile">
      <button class="btn" onclick="addTask()"><i class="fa-solid fa-paper-plane"></i> Assign Task</button>
      <hr style="margin:15px 0; opacity:0.2">
      <h3><i class="fa-solid fa-users"></i> Team Members</h3>
      <div id="memberList"></div>
      <button class="btn btn-green" onclick="addMember()"><i class="fa-solid fa-user-plus"></i> Add Member</button>
    </div>

    <!-- CENTER: TASKS -->
    <div class="panel">
      <h3 id="workspaceTitle"><i class="fa-solid fa-list-check"></i> All Tasks</h3>
      <div id="taskList"></div>
    </div>

    <!-- RIGHT: STATS -->
    <div class="panel">
      <h3><i class="fa-solid fa-chart-pie"></i> Progress</h3>
      <div class="chartBox"><canvas id="taskChart"></canvas></div>
      <h3 style="margin-top:20px"><i class="fa-solid fa-trophy"></i> Top Performer</h3>
      <div id="leaderboard"></div>
      <button class="btn btn-orange" onclick="exportData()"><i class="fa-solid fa-download"></i> Export Data</button>
    </div>
  </div>
</div>

<script>
let currentWorkspace = "";
let db = { tasks: [], members: [] };
let taskChart = null;
const SAVE_KEY = 'NexusHub_v2';

function loadData(){
  let saved = localStorage.getItem(SAVE_KEY);
  db = saved? JSON.parse(saved) : { tasks: [], members: ['You','Alex','Priya','Rahul'] };
  renderMembers();
}

function saveData(){ localStorage.setItem(SAVE_KEY, JSON.stringify(db)); }

function selectWorkspace(ws){
  currentWorkspace = ws;
  document.getElementById('workspaceScreen').style.display="none";
  document.getElementById('mainDashboard').style.display="block";
  document.getElementById('backBtn').style.display="flex";
  document.getElementById('workspaceTitle').innerHTML = `<i class="fa-solid fa-list-check"></i> ${ws} Tasks`;
  loadData(); render();
}

function backToWorkspace(){
  document.getElementById('workspaceScreen').style.display="block";
  document.getElementById('mainDashboard').style.display="none";
  document.getElementById('backBtn').style.display="none";
}

function renderMembers(){
  document.getElementById('taskAssign').innerHTML = '<option value="">Assign To</option>' + db.members.map(m=>`<option>${m}</option>`).join('');
  document.getElementById('memberList').innerHTML = db.members.map(m=>`<div class="member"><i class="fa-solid fa-circle-user"></i> ${m}</div>`).join('');
}

function addMember(){
  let name = prompt("Enter Member Name");
  if(name){ db.members.push(name); saveData(); renderMembers(); }
}

function addTask(){
  let title = document.getElementById('taskTitle').value.trim();
  if(!title) return alert("Enter Task Title");
  let task = {
    id: Date.now(),
    title, 
    desc: document.getElementById('taskDesc').value,
    assign: document.getElementById('taskAssign').value,
    due: document.getElementById('taskDue').value,
    priority: document.getElementById('taskPriority').value,
    status: 'pending',
    workspace: currentWorkspace
  };
  db.tasks.push(task);
  ['taskTitle','taskDesc','taskDue'].forEach(id=>document.getElementById(id).value='');
  saveData(); render(); alert("✅ Task Assigned!");
}

function completeTask(id){
  let t = db.tasks.find(x=>x.id==id);
  t.status = 'done';
  saveData(); render();
}

function render(){
  let tasks = db.tasks.filter(t=>t.workspace==currentWorkspace);
  document.getElementById('taskList').innerHTML = tasks.map(t=>`
    <div class="taskCard ${t.priority} ${t.status}">
      <b>${t.title}</b> <span class="priority ${t.priority}">${t.priority}</span>
      <p style="opacity:0.7; font-size:14px">${t.desc}</p>
      <p style="font-size:13px">👤 ${t.assign || 'Unassigned'} | 📅 ${t.due || 'No due date'}</p>
      ${t.status=='pending'?`<button class="btn btn-green" onclick="completeTask(${t.id})">Mark Done</button>`:''}
    </div>
  `).join('') || '<p style="opacity:0.5">No tasks yet</p>';

  // Leaderboard
  let scores = {};
  db.members.forEach(m=> scores[m] = db.tasks.filter(t=>t.assign==m && t.status=='done').length);
  let top = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('leaderboard').innerHTML = `<div class="member"><i class="fa-solid fa-crown" style="color:gold"></i> ${top?top[0]:'None'} - ${top?top[1]:0} tasks</div>`;

  renderChart(tasks);
}

function renderChart(tasks){
  const ctx = document.getElementById('taskChart');
  let done = tasks.filter(t=>t.status=='done').length;
  let pending = tasks.filter(t=>t.status=='pending').length;
  if(taskChart) taskChart.destroy();
  taskChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: ['Completed','Pending'], datasets: [{ data: [done, pending], backgroundColor: ['#22c55e','#38bdf8'] }] },
    options: { responsive:true, maintainAspectRatio:false }
  });
}

function exportData(){
  let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
  let a = document.createElement('a'); a.href = dataStr; a.download = `${currentWorkspace}_data.json`; a.click();
}

loadData();
</script>
</body>
</html>
